# neo — the only workflow this repo needs. Everything it does lives in reusable workflows in
# psumiya/neo; this file just wires your repo's events to them. Deploy is separate and opt-in
# (see neo-deploy.yml, added only if you choose a deploy target).
#
# The `uses: ...@v0.1.0` refs pin neo to a release, so your pipeline only changes when you bump
# the tag. Upgrade deliberately: update the version here (and in neo-deploy.yml).
name: neo

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC — weekly self-improvement + metrics
  workflow_dispatch:

jobs:
  # Issue gets the `neo:build` label -> hand it to the harness to produce a PR.
  build:
    if: github.event_name == 'issues' && github.event.label.name == 'neo:build'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    uses: psumiya/neo/.github/workflows/neo-build.yml@v0.2.0
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Any PR -> evals gate + risk classify + AI review + auto-merge GREEN.
  review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
    uses: psumiya/neo/.github/workflows/ai-review.yml@v0.2.0
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Weekly (or manual) -> metrics + CLAUDE.md fact-check + audit.
  maintenance:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    uses: psumiya/neo/.github/workflows/maintenance.yml@v0.2.0
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
